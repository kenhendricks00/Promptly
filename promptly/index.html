<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promptly | Sharing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #4cc9f0;
            --text: #f8f9fa;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract Glow Background */
        body::before {
            content: "";
            position: absolute;
            top: -10%; left: -10%;
            width: 50%; height: 50%;
            background: radial-gradient(circle, rgba(76, 201, 240, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(60px);
        }

        body::after {
            content: "";
            position: absolute;
            bottom: -10%; right: -10%;
            width: 50%; height: 50%;
            background: radial-gradient(circle, rgba(67, 97, 238, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(60px);
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            margin: 0 0 1rem;
            font-size: 2rem;
            letter-spacing: -0.02em;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        p {
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background: var(--primary);
            color: #0f172a;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(76, 201, 240, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 201, 240, 0.5);
            filter: brightness(1.1);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✨</div>
        <h1>Shared Prompt Found!</h1>
        <p>A prompt has been shared with you. To import it, simply open the <strong>Promptly Extension</strong> while on this page.</p>
        
        <script>
            // Simple check to see if extension is present (optional)
            // For now, we just give instructions.
        </script>

        <div class="footer-note">
            Don't have Promptly yet? <br>
            <a href="https://github.com/kenhendricks00/Promptly" target="_blank" style="color: var(--primary); text-decoration: none;">Download it here</a>
        </div>
    </div>
</body>
</html>
